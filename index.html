<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram Analyzer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap');
  :root { --bg:#0a0a0a; --surface:#111; --border:#1e1e1e; --accent:#e8ff47; --accent2:#ff6b35; --text:#f0f0f0; --muted:#555; --success:#47ffb2; }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;padding:40px 20px;}
  .container{max-width:820px;margin:0 auto;}
  header{margin-bottom:48px;border-bottom:1px solid var(--border);padding-bottom:32px;}
  .label{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--accent);letter-spacing:.2em;text-transform:uppercase;margin-bottom:12px;}
  h1{font-size:clamp(32px,6vw,52px);font-weight:800;line-height:1;letter-spacing:-.02em;}
  h1 span{color:var(--accent);}
  .subtitle{margin-top:12px;color:var(--muted);font-size:13px;font-family:'IBM Plex Mono',monospace;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:2px;padding:28px;margin-bottom:16px;}
  .card-title{font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--muted);letter-spacing:.15em;text-transform:uppercase;margin-bottom:20px;}
  input{background:var(--bg);border:1px solid var(--border);border-radius:2px;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:13px;padding:12px 16px;width:100%;transition:border-color .2s;outline:none;}
  input:focus{border-color:var(--accent);}
  input::placeholder{color:#333;}
  .btn{display:block;background:var(--accent);color:#000;border:none;border-radius:2px;font-family:'Syne',sans-serif;font-size:16px;font-weight:800;padding:18px 32px;cursor:pointer;width:100%;margin-top:16px;text-transform:uppercase;letter-spacing:.05em;}
  .btn:hover{background:#d4eb00;}
  .btn:disabled{background:#222;color:#444;cursor:not-allowed;}
  #statusBox{display:none;background:var(--surface);border:1px solid var(--border);border-radius:2px;padding:24px 28px;margin-bottom:16px;}
  #statusBox.active{display:block;}
  .step{display:flex;align-items:center;gap:10px;padding:5px 0;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--muted);}
  .step.done{color:var(--success);}
  .step.running{color:var(--accent);}
  .step.err{color:var(--accent2);}
  .dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0;}
  .spin{width:12px;height:12px;border:1.5px solid var(--accent);border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .progress-bar{width:100%;height:3px;background:var(--border);border-radius:2px;margin-top:12px;overflow:hidden;}
  .progress-fill{height:100%;background:var(--accent);width:0%;transition:width .5s ease;}
  #errorBox{display:none;background:#1a0800;border:1px solid var(--accent2);border-radius:2px;padding:16px 20px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--accent2);margin-bottom:16px;line-height:1.7;}
  #errorBox.visible{display:block;}
  #report{display:none;}
  #report.visible{display:block;animation:fadeIn .4s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .report-top{background:var(--surface);border:1px solid var(--accent);border-radius:2px;padding:28px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:flex-start;gap:20px;flex-wrap:wrap;}
  .report-username{font-size:32px;font-weight:800;letter-spacing:-.02em;}
  .report-username span{color:var(--accent);}
  .report-meta{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);line-height:2;text-align:right;}
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px;}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:2px;padding:18px;}
  .stat-val{font-size:22px;font-weight:800;color:var(--accent);letter-spacing:-.02em;}
  .stat-lbl{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.1em;}
  .section{background:var(--surface);border:1px solid var(--border);border-radius:2px;padding:28px;margin-bottom:16px;}
  .section-title{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);font-family:'IBM Plex Mono',monospace;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border);}
  .section-body{font-family:'IBM Plex Mono',monospace;font-size:13px;line-height:1.9;color:#ccc;white-space:pre-wrap;}
  .btn-row{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;}
  .copy-btn{background:transparent;border:1px solid var(--border);color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:11px;padding:10px 18px;cursor:pointer;border-radius:2px;transition:all .2s;}
  .copy-btn:hover{border-color:var(--accent);color:var(--accent);}
  .dl-btn{background:var(--accent);border:none;color:#000;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;padding:10px 18px;cursor:pointer;border-radius:2px;transition:all .2s;}
  .dl-btn:hover{background:#d4eb00;}
  .transcript-section{background:#0d1a00;border:1px solid #2a3a00;border-radius:2px;padding:28px;margin-bottom:16px;}
  .transcript-item{border-bottom:1px solid #1a2a00;padding:16px 0;}
  .transcript-item:last-child{border-bottom:none;}
  .transcript-meta{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);margin-bottom:8px;}
  .transcript-text{font-family:'IBM Plex Mono',monospace;font-size:12px;line-height:1.8;color:#aaccaa;}
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="label">// аналитический инструмент v3.0</div>
    <h1>INSTAGRAM<br><span>ANALYZER</span></h1>
    <div class="subtitle">→ профиль · посты · транскрипции · контент-стратегия · отчёт</div>
  </header>

  <div class="card">
    <div class="card-title">// введи username</div>
    <input type="text" id="username" placeholder="username (без @)" value="husan.mamasaidov" />
    <button class="btn" id="analyzeBtn">&#9654; ЗАПУСТИТЬ АНАЛИЗ</button>
  </div>

  <div id="errorBox"></div>

  <div id="statusBox">
    <div class="step" id="s1"><div class="dot"></div><span>Ожидание...</span></div>
    <div class="step" id="s2"><div class="dot"></div><span>Ожидание...</span></div>
    <div class="step" id="s3"><div class="dot"></div><span>Ожидание...</span></div>
    <div class="step" id="s4"><div class="dot"></div><span>Ожидание...</span></div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>

  <div id="report">
    <div class="report-top">
      <div>
        <div class="label">// отчёт готов</div>
        <div class="report-username"><span>@</span><span id="rUsername"></span></div>
      </div>
      <div class="report-meta" id="rMeta"></div>
    </div>

    <div class="stats-grid" id="statsGrid"></div>

    <div class="section">
      <div class="section-title">// анализ контента · claude ai</div>
      <div class="section-body" id="rAnalysis"></div>
      <div class="btn-row">
        <button class="copy-btn" id="copyBtn">&#8984; копировать отчёт</button>
        <button class="dl-btn" id="dlReportBtn">&#8659; скачать отчёт .txt</button>
        <button class="dl-btn" id="dlTranscriptBtn">&#9654; скачать транскрипции .txt</button>
      </div>
    </div>

    <div class="transcript-section" id="transcriptSection" style="display:none">
      <div class="section-title">// транскрипции видео</div>
      <div id="transcriptList"></div>
    </div>
  </div>
</div>

<script>
document.getElementById('analyzeBtn').addEventListener('click', startAnalysis);
document.getElementById('copyBtn').addEventListener('click', copyReport);
document.getElementById('dlReportBtn').addEventListener('click', downloadReport);
document.getElementById('dlTranscriptBtn').addEventListener('click', downloadTranscripts);

function setStep(id, state, text) {
  var el = document.getElementById(id);
  el.className = 'step ' + state;
  el.innerHTML = (state === 'running' ? '<div class="spin"></div>' : '<div class="dot"></div>') + '<span>' + text + '</span>';
}

function setProgress(pct) {
  document.getElementById('progressFill').style.width = pct + '%';
}

function showError(msg) {
  var eb = document.getElementById('errorBox');
  eb.innerHTML = '✗ ОШИБКА: ' + msg;
  eb.className = 'visible';
  ['s1','s2','s3','s4'].forEach(function(id){
    if(document.getElementById(id).classList.contains('running'))
      setStep(id, 'err', '✗ ' + msg);
  });
}

async function startAnalysis() {
  var username = document.getElementById('username').value.trim().replace('@','');
  if (!username) { alert('Введи username!'); return; }

  document.getElementById('errorBox').className = '';
  document.getElementById('report').className = '';
  document.getElementById('transcriptSection').style.display = 'none';
  document.getElementById('analyzeBtn').disabled = true;
  document.getElementById('statusBox').className = 'active';
  setProgress(0);

  setStep('s1', 'running', 'Запускаем Apify scraper...');
  setStep('s2', 'pending', 'Ожидание...');
  setStep('s3', 'pending', 'Ожидание...');
  setStep('s4', 'pending', 'Ожидание...');

  try {
    var startRes = await fetch('/api/analyze', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({username: username})
    });
    var startData = await startRes.json();
    if (!startRes.ok || startData.error) throw new Error(startData.error);

    var runId = startData.runId;
    var datasetId = startData.datasetId;

    setStep('s1', 'done', 'Apify запущен ✓');
    setStep('s2', 'running', 'Scraping Instagram + транскрипции видео...');
    setProgress(10);

    var attempts = 0;
    var maxAttempts = 60;
    var data = null;

    while (attempts < maxAttempts) {
      await new Promise(function(r){ setTimeout(r, 5000); });
      attempts++;
      setProgress(10 + Math.min(attempts / maxAttempts * 70, 70));
      setStep('s2', 'running', 'Обрабатываем данные + транскрибируем видео... ' + (attempts * 5) + 'с');

      var pollRes = await fetch('/api/report', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({runId: runId, datasetId: datasetId, username: username})
      });
      var pollData = await pollRes.json();
      if (pollData.error) throw new Error(pollData.error);
      if (pollData.status === 'done') { data = pollData; break; }
    }

    if (!data) throw new Error('Timeout — попробуй ещё раз');

    setStep('s2', 'done', 'Instagram данные получены ✓');
    setStep('s3', 'done', 'Транскрибировано видео: ' + data.transcribedCount + ' ✓');
    setStep('s4', 'done', 'Claude анализ завершён ✓');
    setProgress(100);

    // Рендерим отчёт
    document.getElementById('rUsername').textContent = data.username;
    document.getElementById('rMeta').innerHTML =
      'Дата: ' + new Date().toLocaleDateString('ru') + '<br>' +
      'Постов: ' + data.postsCount + '<br>' +
      'Видео транскрибировано: ' + data.transcribedCount + '<br>' +
      'Powered by Apify + AssemblyAI + Claude';

    document.getElementById('statsGrid').innerHTML = [
      {val: typeof data.followers === 'number' ? data.followers.toLocaleString('ru') : data.followers, lbl: 'Подписчики'},
      {val: data.avgLikes.toLocaleString('ru'), lbl: 'Ср. лайков'},
      {val: data.avgComments.toLocaleString('ru'), lbl: 'Ср. комментов'},
      {val: data.erRate + '%', lbl: 'ER Rate'},
      {val: data.transcribedCount + ' видео', lbl: 'Транскрибировано'},
    ].map(function(s){
      return '<div class="stat-card"><div class="stat-val">'+s.val+'</div><div class="stat-lbl">'+s.lbl+'</div></div>';
    }).join('');

    document.getElementById('rAnalysis').textContent = data.analysis;

    // Транскрипции
    if (data.transcripts && data.transcripts.length > 0) {
      var tList = document.getElementById('transcriptList');
      tList.innerHTML = data.transcripts.map(function(t, i) {
        return '<div class="transcript-item">' +
          '<div class="transcript-meta">ВИДЕО ' + (i+1) + ' · ' + t.date + ' · ❤️ ' + t.likes + ' 💬 ' + t.comments + '</div>' +
          '<div class="transcript-meta" style="color:#556">' + (t.caption || '') + '</div>' +
          '<div class="transcript-text">' + (t.transcript || '(недоступно)') + '</div>' +
          '</div>';
      }).join('');
      document.getElementById('transcriptSection').style.display = 'block';
    }

    // Сохраняем для скачивания
    window._username = data.username;
    window._reportText = '@' + data.username + ' — Instagram Report\n' + '='.repeat(60) + '\n\nПодписчики: ' + data.followers + ' | ER: ' + data.erRate + '%\nДата: ' + new Date().toLocaleDateString('ru') + '\n\n' + data.analysis;

    if (data.transcripts) {
      window._transcriptText = 'ТРАНСКРИПЦИИ ВИДЕО @' + data.username + '\n' + '='.repeat(60) + '\nДата: ' + new Date().toLocaleDateString('ru') + '\n\n';
      data.transcripts.forEach(function(t, i) {
        window._transcriptText += '--- ВИДЕО ' + (i+1) + ' ---\n';
        window._transcriptText += 'Дата: ' + t.date + ' | Лайки: ' + t.likes + ' | Комменты: ' + t.comments + '\n';
        window._transcriptText += 'Описание: ' + t.caption + '\n\n';
        window._transcriptText += t.transcript + '\n\n';
      });
    }

    document.getElementById('report').className = 'visible';
    document.getElementById('report').scrollIntoView({behavior:'smooth'});

  } catch(e) {
    showError(e.message);
  }

  document.getElementById('analyzeBtn').disabled = false;
}

function copyReport() {
  navigator.clipboard.writeText(window._reportText || '').then(function(){
    var btn = document.getElementById('copyBtn');
    btn.textContent = '✓ скопировано';
    setTimeout(function(){ btn.textContent = '⎘ копировать отчёт'; }, 2000);
  });
}

function downloadReport() {
  downloadFile(window._reportText || '', 'report_' + (window._username || 'instagram') + '.txt');
}

function downloadTranscripts() {
  if (!window._transcriptText) { alert('Транскрипции не найдены'); return; }
  downloadFile(window._transcriptText, 'transcripts_' + (window._username || 'instagram') + '.txt');
}

function downloadFile(text, filename) {
  var blob = new Blob([text], {type: 'text/plain;charset=utf-8'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}
</script>
</body>
</html>
